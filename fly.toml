app = "catatuang-be"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "20s"
  interval = "10s"
  timeout = "5s"
  type = "tcp"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1